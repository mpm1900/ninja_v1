version: "2"
sql:
  - engine: "postgresql"
    queries: "./database/queries"
    schema: "./database/migrations"
    gen:
      go:
        package: "db"
        out: "./internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "jsonb"
            nullable: true
            go_type:
              type: "TeamConfig"
          - db_type: "jsonb"
            nullable: false
            go_type:
              type: "TeamConfig"
          - column: "users.password"
            go_struct_tag: 'json:"-"'
          - column: "users.salt"
            go_struct_tag: 'json:"-"'
